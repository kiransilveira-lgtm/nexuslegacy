<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matricule-se - Nexus Legacy</title>
    <link rel="stylesheet" href="Estilificação do site.css">
    <link rel="icon" type="image/jpeg" href="seets/Icone site.jpeg">
</head>
<body>

    <header class="barra-navegacao">
        <div class="logotipo">NEXUS<span>LEGACY</span></div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="#">MyCoach</a></li>
                <li><a href="treinos.html">Treinos</a></li>
                <li><a href="Cadaspage.html" class="botao-menu">Matricule-se</a></li>
            </ul>
        </nav>
    </header>

    <div class="card">
        <h2>Matricule-se</h2>
        <form id="meuFormulario">
            <fieldset>
                <legend>Informações do Aluno</legend>
                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Exemplo: José Miguel" required>
                </div>
                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div> 
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </fieldset> 
          
            <fieldset>
                <legend>Escolha seu Plano</legend>
                <div class="container-planos">
                    <label class="card-plano">
                        <input type="radio" name="plano" value="Black" checked>
                        <div class="card-conteudo">
                            <h1>Black</h1>
                            <h5>Mensal</h5>
                            <p>R$ 89,90</p>
                            <ul>
                                <li>✓ Sem fidelidade</li>
                                <li>✓ Acesso Total</li>
                                <li>✓ App Incluso</li>
                            </ul>
                        </div>
                    </label>
                    <label class="card-plano">
                        <input type="radio" name="plano" value="Premium">
                        <div class="card-conteudo">
                            <h1>Premium</h1>
                            <h5>Anual</h5>
                            <p>R$ 69,90/mês</p>
                            <ul>
                                <li>✓ Camiseta Exclusiva</li>
                                <li>✓ Brindes VIP</li>
                                <li>✓ Spotify Incluso</li>
                            </ul>
                        </div>
                    </label>
                </div>
            </fieldset>      

            <button type="submit" class="botao-primario" style="width: 100%; border: none; cursor: pointer;">Concluir cadastro</button>
        </form>
    </div>

    <div id="modalSucesso" class="modal-oculto">
        <div class="modal-conteudo">
            <h3>Parabéns!</h3>
            <p>Seu cadastro na <strong>Nexus Legacy</strong> foi concluído com sucesso.</p>
            <button type="button" onclick="fecharModal()">VAMOS TREINAR!</button>
        </div>
    </div>

    <script>
        const formulario = document.getElementById('meuFormulario');
        const modal = document.getElementById('modalSucesso');

        formulario.addEventListener('submit', function(event) {
            event.preventDefault();
            modal.style.display = 'flex';
        });

        function fecharModal() {
            modal.style.display = 'none';
            formulario.reset(); 
            window.location.href = "index.html"; 
        }
    </script>

    <a href="historia.html" class="link-fixo">
        <img src="seets/icone-preto.png">
    </a>
</body>
</html>

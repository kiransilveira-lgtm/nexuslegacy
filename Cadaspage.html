<header class="barra-navegacao">
        <div class="logotipo">NEXUS<span>LEGACY</span></div>
        <nav>
            <ul>
                <li><a href="começo do site.html">Início</a></li>

                <li><a href="treinos.html">Treinos</a></li>
                <li><a href="#" class="botao-menu">Matricule-se</a></li>
            </ul>
        </nav>
    </header>

<div class="card">
    <h2>Matricule-se</h2>
    <form action="enviar-cadastro" method="POST">
      <fieldset>
        <legend>Informações do Aluno</legend>
        <div class="campo">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Exemplo: José Miguel" required>
        </div>
        <div class="campo">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="Exemplo: 000.000.000-00" required>
        </div>
        <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="Exemplo: (00) 00000-0000" required>
        </div> 
        <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Exemplo: seu@email.com" required>
        </div>
      </fieldset> 
      
      <fieldset>
        <legend>Escolha seu Plano</legend>
        <div class="container-planos">
            <label class="card-plano">
                <input type="radio" name="plano" value="Mensal" checked>
                <div class="card-conteudo">
                    <h1>Black</h1>
                    <h5>Mensal</h5>
                    <p>R$ 89,90</p>
                    <ul>
                        <li>✓ Sem fidelidade</li>
                        <li>✓ Acesso a todas as unidades</li>
                        <li>✓ Camiseta exclusiva</li>
                        <li>✓ App incluso</li>
                    </ul>
                </div>
            </label>
            <label class="card-plano">
                <input type="radio" name="plano" value="Anual">
                <div class="card-conteudo">
                    <h1>Premium</h1>
                    <h5>Anual</h5>
                    <p>R$ 69,90/Mês</p>
                    <ul>
                        <li>✓ Sem fidelidade</li>
                        <li>✓ Acesso a todas as unidades</li>
                        <li>✓ Camiseta exclusiva</li>
                        <li>✓ App incluso</li>
                        <li>✓ Leve 7 amigos p/ mês</li>
                        <li>✓ Direito á quatro pré-treino por mês</li>
                        <li>✓ Brindes exclusivos</li>
                        <li>✓ Spotify incluso</li>
                    </ul>
                </div>
            </label>
        </div>
      </fieldset>     

      <button type="submit">Concluir cadastro</button>
  </form>
</div>
    
</body>
</html>
